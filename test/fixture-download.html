<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Bao — download fixture (T10)</title></head>
<body>
  <h1>Morning report</h1>
  <!-- The href is served with Content-Disposition: attachment; the download attribute
       also pins the filename, so clicking downloads report.csv without navigating. -->
  <a id="dl" href="/report.csv" download="report.csv">Download CSV</a>
  <p id="note">Click the link to download the report.</p>
</body>
</html>
