<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bao Icon Options</title>
<style>
  :root{--bg:#F3EEE6;--ink:#2C2620;--muted:#8A7B6A;--line:#E3D8C7;--card:#FFFDF8;--accent:#C2582E}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Inter",system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;padding:40px 24px 80px}
  .head{max-width:1100px;margin:0 auto 30px;text-align:center}
  .head h1{font-size:34px;font-weight:800;letter-spacing:-1px;margin-bottom:8px}
  .head p{color:var(--muted);font-size:16px}
  .toggle{display:inline-flex;gap:6px;margin-top:18px;background:var(--card);border:1px solid var(--line);padding:5px;border-radius:999px}
  .toggle button{border:none;background:transparent;font:inherit;font-weight:700;font-size:14px;color:var(--muted);padding:8px 18px;border-radius:999px;cursor:pointer}
  .toggle button.on{background:var(--ink);color:#fff}
  .grid{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  @media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;text-align:center;transition:.2s}
  .card:hover{transform:translateY(-3px);box-shadow:0 16px 34px -18px rgba(80,50,30,.4)}
  .stage{height:150px;display:flex;align-items:center;justify-content:center;border-radius:14px;margin-bottom:14px;transition:.2s}
  .stage svg{width:112px;height:112px}
  .card .tag{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)}
  .card h3{font-size:16px;font-weight:700;margin:4px 0 4px}
  .card p{font-size:12.5px;color:var(--muted);line-height:1.45}
  .mini{display:flex;gap:8px;justify-content:center;margin-top:12px;align-items:center}
  .mini svg{width:16px;height:16px}.mini .m24{width:24px;height:24px}.mini .m40{width:40px;height:40px}
  .mini span{font-size:10px;color:var(--muted)}
  /* light/dark stage */
  body.dark{--bg:#14121A;--ink:#F3EEE6;--muted:#9C93A6;--line:#2A2536;--card:#1D1A26}
  .stage{background:#FBF4E8}
  body.dark .stage{background:#0E0C14}
</style>
</head>
<body>
  <div class="head">
    <h1>🥟 Bao icon - direction options</h1>
    <p>Same character, twelve treatments. Toggle the backdrop to check both themes. Each shows how it holds up small (16 / 24 / 40px).</p>
    <div class="toggle"><button class="on" onclick="setT('light')">Light</button><button onclick="setT('dark')">Dark</button></div>
  </div>
  <div class="grid" id="grid"></div>

<script>
function setT(t){document.body.classList.toggle('dark',t==='dark');document.querySelectorAll('.toggle button').forEach(b=>b.classList.toggle('on',b.textContent.toLowerCase()===t));}

// ---- shared piece builders ----
const steam = (c='#E4D3BE')=>`<g stroke="${c}" stroke-width="3" stroke-linecap="round" fill="none" opacity=".85"><path d="M38 20 C34 15 42 12 38 7"/><path d="M50 17 C46 12 54 9 50 4"/><path d="M62 20 C58 15 66 12 62 7"/></g>`;
const doughDefs = (id,a,b,c)=>`<radialGradient id="${id}" cx="42%" cy="33%" r="74%"><stop offset="0%" stop-color="${a}"/><stop offset="68%" stop-color="${b}"/><stop offset="100%" stop-color="${c}"/></radialGradient>`;

// each icon = full <svg> string, viewBox 0 0 100 100
const icons = [
{tag:"Classic",name:"Pleated bun",desc:"Round bun with a soft pleated cap and steam. The friendly default.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d1','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}

<ellipse cx="50" cy="33" rx="7" ry="4.5" fill="#FDEFDD" stroke="#EAD5BB" stroke-width="1"/>
<ellipse cx="33" cy="66" rx="7.5" ry="5" fill="#FFC4A0" opacity=".75"/><ellipse cx="67" cy="66" rx="7.5" ry="5" fill="#FFC4A0" opacity=".75"/>
<circle cx="39" cy="59" r="4.4" fill="#2A2320"/><circle cx="61" cy="59" r="4.4" fill="#2A2320"/><circle cx="40.5" cy="57.5" r="1.4" fill="#fff"/><circle cx="62.5" cy="57.5" r="1.4" fill="#fff"/>
<path d="M44 70 Q50 75.5 56 70" stroke="#2A2320" stroke-width="2.6" fill="none" stroke-linecap="round"/></svg>`},

{tag:"Realistic",name:"Spiral pleat",desc:"A true baozi swirl on top - reads unmistakably as a steamed bun.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d2','#FFFDF8','#FBEDD8','#EFD6B4')}</defs>${steam('#E7D6BF')}
<path d="M50 28 C76 28 88 46 88 63 C88 82 70 92 50 92 C30 92 12 82 12 63 C12 46 24 28 50 28Z" fill="url(#d2)" stroke="#E7D2B2" stroke-width="1.5"/>
<path d="M50 27 C58 27 63 33 61 39 C59 44 52 45 49 41 C46 38 49 34 53 35 C56 36 55 39 53 39" fill="none" stroke="#D9BE96" stroke-width="2.4" stroke-linecap="round"/>
<ellipse cx="34" cy="68" rx="7" ry="4.6" fill="#F4B48A" opacity=".7"/><ellipse cx="66" cy="68" rx="7" ry="4.6" fill="#F4B48A" opacity=".7"/>
<circle cx="40" cy="61" r="4.2" fill="#3A302A"/><circle cx="60" cy="61" r="4.2" fill="#3A302A"/><circle cx="41.4" cy="59.6" r="1.3" fill="#fff"/><circle cx="61.4" cy="59.6" r="1.3" fill="#fff"/>
<path d="M45 71 Q50 76 55 71" stroke="#3A302A" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>`},

{tag:"Minimal",name:"Line art",desc:"Single-weight outline, no fills. Scales razor-sharp; great as a favicon or nav mark.",
svg:`<svg viewBox="0 0 100 100" fill="none" stroke="#2C2620" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
<path d="M50 32 C72 32 84 47 84 62 C84 79 69 88 50 88 C31 88 16 79 16 62 C16 47 28 32 50 32Z"/>
<path d="M42 33 Q50 27 58 33"/>
<circle cx="40" cy="60" r="2.6" fill="#2C2620" stroke="none"/><circle cx="60" cy="60" r="2.6" fill="#2C2620" stroke="none"/>
<path d="M44 69 Q50 74 56 69"/></svg>`},

{tag:"App icon","name":"Squircle badge",desc:"Rounded-square store/app tile with a gradient ground. Modern, installable feel.",
svg:`<svg viewBox="0 0 100 100"><defs><linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#FFB56B"/><stop offset="1" stop-color="#E8813A"/></linearGradient>${doughDefs('d3','#FFFDF8','#FFF1DE','#FADFC0')}</defs>
<rect x="6" y="6" width="88" height="88" rx="24" fill="url(#bg3)"/>
${steam('#FFE7C6').replace('opacity=".85"','opacity=".7"')}
<path d="M50 34 C70 34 80 47 80 60 C80 76 66 84 50 84 C34 84 20 76 20 60 C20 47 30 34 50 34Z" fill="url(#d3)"/>
<ellipse cx="50" cy="36" rx="6" ry="3.8" fill="#FCEBD4"/>
<circle cx="41" cy="60" r="3.8" fill="#3A302A"/><circle cx="59" cy="60" r="3.8" fill="#3A302A"/><circle cx="42.2" cy="58.8" r="1.2" fill="#fff"/><circle cx="60.2" cy="58.8" r="1.2" fill="#fff"/>
<ellipse cx="35" cy="66" rx="6" ry="3.8" fill="#FFC4A0" opacity=".8"/><ellipse cx="65" cy="66" rx="6" ry="3.8" fill="#FFC4A0" opacity=".8"/>
<path d="M45 69 Q50 73.5 55 69" stroke="#3A302A" stroke-width="2.4" fill="none" stroke-linecap="round"/></svg>`},

{tag:"Kawaii",name:"Big sparkle eyes",desc:"Extra-cute: huge glossy eyes and a wide grin. Maximum charm for the playful direction.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d4','#FFFEFB','#FFF2E1','#F7DFC4')}</defs>${steam()}
<path d="M50 30 C74 30 86 46 86 62 C86 80 70 90 50 90 C30 90 14 80 14 62 C14 46 26 30 50 30Z" fill="url(#d4)" stroke="#EAD5BB" stroke-width="1.5"/>
<ellipse cx="50" cy="33" rx="7" ry="4.5" fill="#FDEFDD" stroke="#EAD5BB" stroke-width="1"/>
<ellipse cx="31" cy="68" rx="8" ry="5.5" fill="#FFB3A0" opacity=".85"/><ellipse cx="69" cy="68" rx="8" ry="5.5" fill="#FFB3A0" opacity=".85"/>
<ellipse cx="39" cy="60" rx="6.4" ry="7.4" fill="#2A2320"/><ellipse cx="61" cy="60" rx="6.4" ry="7.4" fill="#2A2320"/>
<circle cx="41.4" cy="57.4" r="2.3" fill="#fff"/><circle cx="63.4" cy="57.4" r="2.3" fill="#fff"/><circle cx="37.6" cy="62" r="1.1" fill="#fff"/><circle cx="59.6" cy="62" r="1.1" fill="#fff"/>
<path d="M43 71 Q50 79 57 71" stroke="#2A2320" stroke-width="3" fill="none" stroke-linecap="round"/></svg>`},

{tag:"Sleepy",name:"Content / ^ ^",desc:"Closed happy eyes and a calm smile. Warm, trustworthy, less hyper.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d5','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}
<path d="M50 30 C74 30 86 46 86 62 C86 80 70 90 50 90 C30 90 14 80 14 62 C14 46 26 30 50 30Z" fill="url(#d5)" stroke="#EAD5BB" stroke-width="1.5"/>
<ellipse cx="50" cy="33" rx="7" ry="4.5" fill="#FDEFDD" stroke="#EAD5BB" stroke-width="1"/>

<path d="M34 60 Q39 54 44 60" stroke="#2A2320" stroke-width="2.8" fill="none" stroke-linecap="round"/>
<path d="M56 60 Q61 54 66 60" stroke="#2A2320" stroke-width="2.8" fill="none" stroke-linecap="round"/>
<path d="M45 70 Q50 74 55 70" stroke="#2A2320" stroke-width="2.6" fill="none" stroke-linecap="round"/></svg>`},

{tag:"Product",name:"Record belly",desc:"A record dot on the tummy - literally the app's job. Ties mascot to function.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d6','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}
<path d="M50 30 C74 30 86 46 86 62 C86 80 70 90 50 90 C30 90 14 80 14 62 C14 46 26 30 50 30Z" fill="url(#d6)" stroke="#EAD5BB" stroke-width="1.5"/>
<ellipse cx="50" cy="33" rx="7" ry="4.5" fill="#FDEFDD" stroke="#EAD5BB" stroke-width="1"/>
<circle cx="39" cy="57" r="4" fill="#2A2320"/><circle cx="61" cy="57" r="4" fill="#2A2320"/><circle cx="40.3" cy="55.8" r="1.2" fill="#fff"/><circle cx="62.3" cy="55.8" r="1.2" fill="#fff"/>
<ellipse cx="31" cy="63" rx="6.5" ry="4.2" fill="#FFC4A0" opacity=".75"/><ellipse cx="69" cy="63" rx="6.5" ry="4.2" fill="#FFC4A0" opacity=".75"/>
<circle cx="50" cy="74" r="9" fill="#fff" stroke="#EAD5BB" stroke-width="1.5"/><circle cx="50" cy="74" r="4.6" fill="#E23B3B"/></svg>`},

{tag:"Wink",name:"Winking + hand",desc:"A cheeky wink with a little wave. Personable, good for onboarding moments.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d7','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}
<path d="M50 30 C74 30 86 46 86 62 C86 80 70 90 50 90 C30 90 14 80 14 62 C14 46 26 30 50 30Z" fill="url(#d7)" stroke="#EAD5BB" stroke-width="1.5"/>
<ellipse cx="50" cy="33" rx="7" ry="4.5" fill="#FDEFDD" stroke="#EAD5BB" stroke-width="1"/>
<ellipse cx="33" cy="66" rx="7.5" ry="5" fill="#FFC4A0" opacity=".8"/><ellipse cx="67" cy="66" rx="7.5" ry="5" fill="#FFC4A0" opacity=".8"/>
<circle cx="39" cy="59" r="4.4" fill="#2A2320"/><circle cx="40.4" cy="57.6" r="1.4" fill="#fff"/>
<path d="M56 59 Q61 55 66 59" stroke="#2A2320" stroke-width="2.8" fill="none" stroke-linecap="round"/>
<path d="M44 70 Q50 75 56 70" stroke="#2A2320" stroke-width="2.6" fill="none" stroke-linecap="round"/>
<circle cx="82" cy="70" r="7" fill="url(#d7)" stroke="#EAD5BB" stroke-width="1.5"/></svg>`},

{tag:"In basket",name:"Bamboo steamer",desc:"Bun nestled in a steamer basket - rich, storytelling logo for hero or packaging.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d8','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}
<path d="M50 34 C70 34 80 47 80 59 C80 68 71 73 50 73 C29 73 20 68 20 59 C20 47 30 34 50 34Z" fill="url(#d8)" stroke="#EAD5BB" stroke-width="1.5"/>
<ellipse cx="50" cy="36" rx="6" ry="3.8" fill="#FDEFDD"/>
<circle cx="41" cy="56" r="3.8" fill="#2A2320"/><circle cx="59" cy="56" r="3.8" fill="#2A2320"/><circle cx="42.2" cy="54.8" r="1.2" fill="#fff"/><circle cx="60.2" cy="54.8" r="1.2" fill="#fff"/>
<ellipse cx="34" cy="62" rx="6" ry="3.8" fill="#FFC4A0" opacity=".75"/><ellipse cx="66" cy="62" rx="6" ry="3.8" fill="#FFC4A0" opacity=".75"/>
<path d="M45 64 Q50 68 55 64" stroke="#2A2320" stroke-width="2.3" fill="none" stroke-linecap="round"/>
<rect x="16" y="72" width="68" height="16" rx="5" fill="#E8C79A"/><rect x="16" y="72" width="68" height="16" rx="5" fill="none" stroke="#CFA876" stroke-width="1.5"/>
<g stroke="#CFA876" stroke-width="1.5">${[24,34,44,54,64,74].map(x=>`<line x1="${x}" y1="72" x2="${x}" y2="88"/>`).join('')}</g></svg>`},

{tag:"Monogram",name:"B-in-bun",desc:"A hidden 'B' formed by the steam and bun. Corporate, works in one flat color.",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d9','#FFFDF8','#FBEDD8','#EFD6B4')}</defs>
<path d="M50 26 C78 26 90 45 90 63 C90 83 71 94 50 94 C29 94 10 83 10 63 C10 45 22 26 50 26Z" fill="url(#d9)" stroke="#E4CFA9" stroke-width="1.5"/>
<path d="M40 44 h14 a10 10 0 0 1 0 20 h-14 z M40 64 h16 a10 10 0 0 1 0 20 h-16 z" fill="none" stroke="#C2582E" stroke-width="5" stroke-linejoin="round" transform="translate(0,-8) scale(0.86) translate(6,4)"/>
</svg>`},

{tag:"Retro",name:"8-bit bao",desc:"Pixel-art bun for a nerdier, playful brand. Distinct in a crowded store shelf.",
svg:`<svg viewBox="0 0 100 100" shape-rendering="crispEdges">${(()=>{const g='#F6DEC2',d='#FCEFDB',k='#2A2320',p='#FFB3A0',w='#fff';const s=10;const cells=[
// [col,row,color] on a 10x10 grid
[3,2,d],[4,2,d],[5,2,d],[6,2,d],
[2,3,g],[3,3,d],[4,3,d],[5,3,d],[6,3,d],[7,3,g],
[1,4,g],[2,4,g],[3,4,g],[4,4,g],[5,4,g],[6,4,g],[7,4,g],[8,4,g],
[1,5,g],[2,5,g],[3,5,k],[4,5,g],[5,5,g],[6,5,k],[7,5,g],[8,5,g],
[1,6,g],[2,6,p],[3,6,g],[4,6,g],[5,6,g],[6,6,g],[7,6,p],[8,6,g],
[1,7,g],[2,7,g],[3,7,g],[4,7,k],[5,7,k],[6,7,g],[7,7,g],[8,7,g],
[2,8,g],[3,8,g],[4,8,g],[5,8,g],[6,8,g],[7,8,g]
];return cells.map(([c,r,col])=>`<rect x="${c*s}" y="${r*s}" width="${s}" height="${s}" fill="${col}"/>`).join('')})()}</svg>`},

{tag:"Cursor",name:"Click hand",desc:"Bun offering a click cursor - action-forward. Signals 'it does the clicking for you.'",
svg:`<svg viewBox="0 0 100 100"><defs>${doughDefs('d10','#FFFEFB','#FFF3E4','#F6DEC2')}</defs>${steam()}
<path d="M50 30 C74 30 86 46 86 62 C86 80 70 90 50 90 C30 90 14 80 14 62 C14 46 26 30 50 30Z" fill="url(#d10)" stroke="#EAD5BB" stroke-width="1.5"/>

<path d="M70 66 l4 20 4-6 5 4 2-3-5-4 6-2z" fill="#2A2320"/></svg>`},
];

const grid=document.getElementById('grid');
grid.innerHTML=icons.map(ic=>`<div class="card">
  <div class="stage">${ic.svg}</div>
  <div class="tag">${ic.tag}</div><h3>${ic.name}</h3><p>${ic.desc}</p>
  <div class="mini">${ic.svg}<span>16</span>${ic.svg.replace('<svg','<svg class="m24"')}<span>24</span>${ic.svg.replace('<svg','<svg class="m40"')}<span>40</span></div>
</div>`).join('');
// force mini sizes via class already set; ensure first svg is 16
document.querySelectorAll('.mini svg').forEach((s,i)=>{});
</script>
</body>
</html>
