<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bao — Dashboard</title>
  <style>
    :root { --line: #e5e5e5; --muted: #999; --accent: #36c; --ok: #2a7; --bad: #e11; }
    * { box-sizing: border-box; }
    body { font: 14px system-ui, sans-serif; margin: 0; color: #222; background: #fafafa; }
    [hidden] { display: none !important; }
    button { font: inherit; padding: 6px 11px; cursor: pointer; border: 1px solid var(--line);
             background: #fff; border-radius: 6px; }
    button:hover { background: #f2f2f2; }
    button:disabled { cursor: default; opacity: .5; }
    input { font: inherit; padding: 7px 9px; box-sizing: border-box; border: 1px solid var(--line);
            border-radius: 6px; }

    .app { display: grid; grid-template-columns: minmax(300px, 380px) 1fr; min-height: 100vh; }
    .lib { border-right: 1px solid var(--line); background: #fff; display: flex; flex-direction: column; }
    .lib header { padding: 16px; border-bottom: 1px solid var(--line); position: sticky; top: 0;
                  background: #fff; z-index: 5; }
    .lib h1 { font-size: 18px; margin: 0 0 10px; display: flex; align-items: center; gap: 8px; }
    .lib h1 .tag { font-size: 11px; font-weight: 400; color: var(--muted); border: 1px solid var(--line);
                   border-radius: 4px; padding: 1px 5px; }
    #search { width: 100%; }
    .libhint { color: var(--muted); font-size: 12px; margin-top: 8px; }
    .libbody { padding: 8px 12px 24px; overflow-y: auto; }
    .group-h { display: flex; align-items: center; gap: 4px; margin: 14px 0 4px; color: #444;
               font-size: 12px; font-weight: 600; user-select: none; }
    .group-h .n { color: var(--muted); font-weight: 400; }
    .card { border: 1px solid var(--line); border-radius: 7px; padding: 9px 11px; margin: 6px 0;
            display: flex; align-items: center; gap: 8px; cursor: pointer; background: #fff; }
    .card:hover { border-color: #ccc; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .card.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
    .card .body { flex: 1; min-width: 0; }
    .card .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; }
    .card .meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .card .run { padding: 4px 9px; }
    .empty { color: var(--muted); margin: 18px 4px; }

    .detail { padding: 28px 32px; max-width: 900px; }
    .placeholder { color: var(--muted); margin-top: 60px; text-align: center; font-size: 15px; }
    .dhead { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    .dhead h2 { font-size: 20px; margin: 0; }
    .dmeta { color: var(--muted); font-size: 13px; margin: 6px 0 16px; }
    .dactions { display: flex; gap: 8px; margin-bottom: 22px; flex-wrap: wrap; }
    .dactions .danger { color: var(--bad); }
    section.block { margin-bottom: 26px; }
    section.block > h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .04em;
                         color: var(--muted); margin: 0 0 8px; }

    .steps { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden;
             font-family: ui-monospace, monospace; font-size: 12.5px; }
    .srow { padding: 7px 12px; display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline;
            border-top: 1px solid #f0f0f0; }
    .srow:first-child { border-top: 0; }
    .srow .num { color: var(--muted); min-width: 1.6em; text-align: right; }
    .srow .lbl { flex: 1; min-width: 0; overflow-wrap: anywhere; }
    .srow.start { color: var(--muted); font-style: italic; background: #fbfbfb; }
    .srow.edit { align-items: center; }
    .srow .ctl { display: flex; gap: 2px; flex: none; }
    .srow .ctl button { padding: 1px 6px; font-size: 12px; line-height: 1.5; border-radius: 4px; }
    .srow .ctl .del { color: var(--bad); }
    .srow .vedit { flex-basis: 100%; display: flex; gap: 6px; margin: 4px 0 0 calc(1.6em + 8px); }
    .srow .vedit input, .srow .vedit select { font: inherit; padding: 3px 6px; }
    .srow .vedit input { flex: 1; min-width: 0; }
    .steps.editing { border-color: var(--accent); }
    .dactions #dsave { border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .dactions #ddebug.active { border-color: var(--accent); color: var(--accent); background: #f0f4ff; }

    /* debug rows: each step expands to its full recorded IR */
    .steps.debug { border-color: var(--accent); }
    details.dbg { border-top: 1px solid #f0f0f0; }
    details.dbg:first-child { border-top: 0; }
    details.dbg > summary { padding: 7px 12px; display: flex; flex-wrap: wrap; gap: 8px;
                            align-items: baseline; cursor: pointer; list-style: none; }
    details.dbg > summary::-webkit-details-marker { display: none; }
    details.dbg > summary::before { content: "▸"; color: var(--muted); margin-right: 2px; }
    details.dbg[open] > summary::before { content: "▾"; }
    details.dbg[open] > summary { background: #f7f9ff; }
    details.dbg > summary:hover { background: #f4f4f5; }
    details.dbg .num { color: var(--muted); min-width: 1.4em; text-align: right; }
    details.dbg .lbl { flex: 1; min-width: 0; overflow-wrap: anywhere; }
    details.dbg .badge { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em;
                         color: #555; background: #eef0f2; border-radius: 4px; padding: 1px 6px; flex: none; }
    .dbgbody { padding: 4px 14px 14px; background: #fbfbfc; font-family: system-ui, sans-serif;
               font-size: 12.5px; }
    .dbgsec { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted);
              margin: 14px 0 6px; font-family: system-ui, sans-serif; }
    .dbgframe { position: relative; display: inline-block; max-width: 100%; border: 1px solid var(--line);
                border-radius: 6px; overflow: hidden; background: #f4f4f5; color: var(--muted); }
    .dbgframe.noframe { padding: 20px 26px; }
    .dbgframe img { display: block; max-width: 100%; height: auto; }
    .dbgframe .bbox { position: absolute; border: 2px solid var(--accent);
                      box-shadow: 0 0 0 9999px rgba(51,102,204,.12); border-radius: 2px; pointer-events: none; }
    .seltable { display: flex; flex-direction: column; gap: 3px; }
    .selrow { display: flex; align-items: baseline; gap: 8px; }
    .selrank { color: var(--muted); min-width: 1.2em; text-align: right; font-variant-numeric: tabular-nums; }
    .seltype { flex: none; min-width: 70px; color: var(--accent); font-weight: 600; font-size: 11.5px; }
    .selval { flex: 1; min-width: 0; font-family: ui-monospace, monospace; font-size: 12px;
              overflow-wrap: anywhere; background: #fff; border: 1px solid var(--line);
              border-radius: 4px; padding: 1px 6px; }
    .selscore { flex: none; color: var(--muted); font-variant-numeric: tabular-nums; }
    .kv { display: grid; grid-template-columns: max-content 1fr; gap: 3px 14px; align-items: baseline; }
    .kv .k { color: var(--muted); white-space: nowrap; }
    .kv .v { font-family: ui-monospace, monospace; font-size: 12px; overflow-wrap: anywhere; }
    details.snap { margin-top: 12px; }
    details.snap > summary { cursor: pointer; color: var(--accent); font-size: 12px; }
    details.snap pre { margin: 6px 0 0; padding: 8px 10px; background: #fff; border: 1px solid var(--line);
                       border-radius: 6px; max-height: 240px; overflow: auto; font-size: 11.5px;
                       white-space: pre-wrap; overflow-wrap: anywhere; }

    .blockhead { display: flex; align-items: center; justify-content: space-between; }
    .blockhead h3 { margin: 0 0 8px; }
    #dclear { padding: 3px 9px; font-size: 12px; color: var(--bad); }
    .runs { display: flex; flex-direction: column; gap: 6px; }
    .run-row { display: flex; align-items: center; gap: 10px; border: 1px solid var(--line);
               border-radius: 7px; padding: 8px 12px; background: #fff; cursor: pointer; }
    .run-row:hover { border-color: #ccc; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
    .dot.passed { background: var(--ok); }
    .dot.failed { background: var(--bad); }
    .run-row .when { flex: 1; min-width: 0; }
    .run-row .sub { color: var(--muted); font-size: 12px; }
    .runs .empty { margin: 8px 2px; }

    /* filmstrip player */
    .player { position: fixed; inset: 0; z-index: 30; background: rgba(20,20,22,.55);
              display: flex; align-items: center; justify-content: center; padding: 24px; }
    .player-box { background: #fff; border-radius: 12px; width: min(1000px, 100%);
                  max-height: 92vh; overflow: auto; padding: 18px 20px 20px;
                  box-shadow: 0 12px 40px rgba(0,0,0,.3); }
    .phead { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .phead .pinfo { display: flex; align-items: center; gap: 8px; font-size: 15px; }
    .phead .sub { color: var(--muted); font-size: 13px; font-weight: 400; }
    #pclose { border: 0; background: none; font-size: 18px; padding: 2px 8px; color: var(--muted); }
    .frames { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 14px 0 10px; }
    .frames figure { margin: 0; }
    .frames figcaption { font-size: 11px; text-transform: uppercase; letter-spacing: .05em;
                         color: var(--muted); margin-bottom: 5px; }
    .frame { border: 1px solid var(--line); border-radius: 8px; background: #f4f4f5;
             aspect-ratio: 16 / 10; display: flex; align-items: center; justify-content: center;
             overflow: hidden; }
    .frame img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .frame .noframe { color: var(--muted); font-size: 12px; }
    .pstep { font-family: ui-monospace, monospace; font-size: 12.5px; margin: 6px 2px 12px;
             display: flex; gap: 8px; align-items: baseline; }
    .pstep .ok { color: var(--ok); } .pstep .bad { color: var(--bad); }
    .scrub { display: flex; align-items: center; gap: 12px; justify-content: center; }
    .dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
    .dots .d { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #ccc;
               background: #fff; cursor: pointer; padding: 0; }
    .dots .d.ok { background: var(--ok); border-color: var(--ok); }
    .dots .d.bad { background: var(--bad); border-color: var(--bad); }
    .dots .d.cur { outline: 2px solid var(--accent); outline-offset: 1px; }
    .pactions { margin-top: 14px; text-align: right; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="lib">
      <header>
        <h1>Bao <span class="tag">Dashboard</span></h1>
        <input id="search" type="search" placeholder="Search workflows…" />
        <div class="libhint">Record from the side panel (toolbar icon). Saved workflows appear here.</div>
        <div style="margin-top:10px; display:flex; gap:8px;">
          <button id="import">⤓ Import…</button>
        </div>
        <input id="importfile" type="file" accept=".json" hidden />
      </header>
      <div class="libbody"><div id="list"></div></div>
    </aside>

    <main class="detail">
      <div id="placeholder" class="placeholder">Select a workflow to view its steps and run history.</div>

      <div id="detail" hidden>
        <div class="dhead">
          <h2 id="dname"></h2>
        </div>
        <div id="dmeta" class="dmeta"></div>
        <div class="dactions">
          <button id="drun">▶ Run</button>
          <button id="dedit">✎ Edit steps</button>
          <button id="ddebug" title="Expand every step to its selectors, metadata & golden screenshot">🐞 Debug</button>
          <button id="dexport">⤓ Export</button>
          <button id="ddelete" class="danger">🗑 Delete</button>
          <button id="dsave" hidden>✔ Save</button>
          <button id="dcancel" hidden>Cancel</button>
        </div>

        <section class="block">
          <h3 id="stepshead">Steps</h3>
          <div id="dsteps" class="steps"></div>
        </section>

        <section class="block">
          <div class="blockhead">
            <h3>Run history</h3>
            <button id="dclear" hidden>Clear history</button>
          </div>
          <div id="druns" class="runs"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Filmstrip player: re-watch a past run, record-time vs replay-time, step by step. -->
  <div id="player" class="player" hidden>
    <div class="player-box">
      <header class="phead">
        <div class="pinfo"><span id="pdot" class="dot"></span> <b id="poutcome"></b> <span id="pmeta" class="sub"></span></div>
        <button id="pclose" title="Close">✕</button>
      </header>
      <div class="frames">
        <figure><figcaption>Recorded</figcaption><div id="pgolden" class="frame"></div></figure>
        <figure><figcaption>Replayed</figcaption><div id="preplay" class="frame"></div></figure>
      </div>
      <div class="pstep"><span id="pstepnum" class="num"></span> <span id="pstepresult"></span></div>
      <div class="scrub">
        <button id="pprev">◀ Prev</button>
        <div id="pdots" class="dots"></div>
        <button id="pnext">Next ▶</button>
      </div>
      <div class="pactions"><button id="pdelrun" class="danger">🗑 Delete this run</button></div>
    </div>
  </div>

  <script src="dist/dashboard.js"></script>
</body>
</html>
